[custom]
;不要随意改变关键字，否则会导致出错
;acl4SSR规则

;设置规则标志位
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🐳 漏网之鱼,[]FINAL
;设置规则标志位

;设置分组标志位
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🇰🇷 首尔_ARM`[]🇸🇬 狮城_ARM`[]🔰 手动切换
custom_proxy_group=🐳 漏网之鱼`select`[]DIRECT`[]🇰🇷 首尔_ARM`[]🇸🇬 狮城_ARM`[]🔰 手动切换

;设置分组标志位
enable_rule_generator=true
overwrite_original_rules=true

;设置emoji国旗图标
add_emoji=true
remove_old_emoji=true

rule=(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States),🇺🇸
rule=(港|HK|Hong Kong),🇭🇰
rule=(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|[^-]日|JP|Japan),🇯🇵
rule=(新加坡|坡|狮城|SG|Singapore),🇸🇬
rule=(台|新北|彰化|TW|Taiwan),🇨🇳
rule=(KR|Korea|KOR|首尔|韩|韓|仁川),🇰🇷

;排除匹配到的节点
exclude_remarks=(到期|时间|官网|产品|平台|机场|cdn|EDtunnel)

clash_rule_base=https://raw.githubusercontent.com/rastyu/ggjjdd/main/clash/GeneralClashConfig.yml

;在 header 里的加入流量信息
;append_sub_userinfo=true
